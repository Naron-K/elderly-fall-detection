; Vela Configuration for Grove Vision AI V2 (Ethos-U55)
; Used to compile TFLite INT8 models for deployment
;
; Hardware: WiseEye2 HX6538
;   - Arm Ethos-U55 (128 MAC units)
;   - Shared SRAM architecture
;
; Usage: vela --config vela_config.ini --system-config Ethos_U55_High_End_Embedded ...

[System_Config.Ethos_U55_High_End_Embedded]
core_clock=400e6
axi0_port=Sram
axi1_port=Sram

[Memory_Mode.Shared_Sram]
const_mem_area=Axi0
arena_mem_area=Axi1
cache_mem_area=Axi0
arena_cache_size=2097152

; Optimisation target: Performance (alternatives: Size)
[Optimisation.Performance]
weight_estimation_scaling=1.0
